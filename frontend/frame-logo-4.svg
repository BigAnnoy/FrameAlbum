<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-f4" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="glow-f4" cx="36%" cy="33%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-f4)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#glow-f4)"/>

  <!-- 四宫格布局（4帧缩略图网格，模拟相册墙） -->
  <!-- 左上 -->
  <rect x="16" y="16" width="30" height="30" rx="4" ry="4"
    fill="url(#frame-shine)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.9"/>
  <!-- 右上 -->
  <rect x="52" y="16" width="30" height="30" rx="4" ry="4"
    fill="url(#frame-shine)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.9"/>
  <!-- 左下 -->
  <rect x="16" y="52" width="30" height="30" rx="4" ry="4"
    fill="url(#frame-shine)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.9"/>
  <!-- 右下（高亮激活帧） -->
  <rect x="52" y="52" width="30" height="30" rx="4" ry="4"
    fill="#ffffff" fill-opacity="0.25" stroke="#ffffff" stroke-width="2.5" stroke-opacity="1"/>

  <!-- 左上帧内容：小山 -->
  <polyline points="19,40 25,30 31,38 37,32 43,40"
    fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8"/>

  <!-- 右上帧内容：太阳 -->
  <circle cx="67" cy="29" r="5" fill="#ffffff" opacity="0.8"/>
  <line x1="67" y1="20" x2="67" y2="22" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="67" y1="36" x2="67" y2="38" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="58" y1="29" x2="60" y2="29" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="74" y1="29" x2="76" y2="29" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- 左下帧内容：人像圆 -->
  <circle cx="31" cy="62" r="6" fill="#ffffff" opacity="0.8"/>
  <path d="M20,78 Q31,70 42,78" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- 右下帧内容（激活帧）：星形/收藏 -->
  <polygon points="67,56 69.5,63 77,63 71,67.5 73.5,74.5 67,70 60.5,74.5 63,67.5 57,63 64.5,63"
    fill="#ffffff" opacity="0.95"/>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="14" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
