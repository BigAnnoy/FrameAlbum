<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-f3" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <radialGradient id="glow-f3" cx="36%" cy="33%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-f3)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#glow-f3)"/>

  <!-- 三张叠放的相框（错落排列，表示相册/多帧） -->
  <!-- 最底层（右下偏移，最淡） -->
  <rect x="28" y="32" width="44" height="34" rx="4" ry="4"
    fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3"
    transform="rotate(8 50 49)"/>

  <!-- 中间层（轻微旋转） -->
  <rect x="24" y="28" width="44" height="34" rx="4" ry="4"
    fill="none" stroke="#ffffff" stroke-width="2.2" stroke-opacity="0.55"
    transform="rotate(-4 50 45)"/>

  <!-- 最上层（正面，最亮） -->
  <rect x="20" y="25" width="44" height="34" rx="4" ry="4"
    fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-width="2.8" stroke-opacity="0.95"/>

  <!-- 最上层内：圆形头像占位（人像感） -->
  <circle cx="42" cy="42" r="9" fill="#ffffff" opacity="0.85"/>
  <!-- 肩膀弧线 -->
  <path d="M27,59 Q42,50 57,59" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.85"/>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="17" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
