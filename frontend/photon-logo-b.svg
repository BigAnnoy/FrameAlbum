<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-b" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="lens-b" cx="35%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-b)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#lens-b)"/>

  <!-- 光圈叶片造型（6片） -->
  <g transform="translate(50,50)">
    <!-- 6片弧形叶片 -->
    <path d="M0,-22 A22,22 0 0,1 19,-11 L8,-4.5 A9,9 0 0,0 0,-9 Z"
      fill="#ffffff" opacity="0.9" transform="rotate(0)"/>
    <path d="M0,-22 A22,22 0 0,1 19,-11 L8,-4.5 A9,9 0 0,0 0,-9 Z"
      fill="#ffffff" opacity="0.9" transform="rotate(60)"/>
    <path d="M0,-22 A22,22 0 0,1 19,-11 L8,-4.5 A9,9 0 0,0 0,-9 Z"
      fill="#ffffff" opacity="0.9" transform="rotate(120)"/>
    <path d="M0,-22 A22,22 0 0,1 19,-11 L8,-4.5 A9,9 0 0,0 0,-9 Z"
      fill="#ffffff" opacity="0.9" transform="rotate(180)"/>
    <path d="M0,-22 A22,22 0 0,1 19,-11 L8,-4.5 A9,9 0 0,0 0,-9 Z"
      fill="#ffffff" opacity="0.9" transform="rotate(240)"/>
    <path d="M0,-22 A22,22 0 0,1 19,-11 L8,-4.5 A9,9 0 0,0 0,-9 Z"
      fill="#ffffff" opacity="0.9" transform="rotate(300)"/>
    <!-- 中心圆孔 -->
    <circle cx="0" cy="0" r="9" fill="url(#bg-b)"/>
    <!-- 中心光点 -->
    <circle cx="0" cy="0" r="4.5" fill="#93c5fd"/>
    <circle cx="-1.5" cy="-1.5" r="1.5" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="17" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
