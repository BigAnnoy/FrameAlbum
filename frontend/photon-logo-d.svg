<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-d" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="spark-d" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-d" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-d)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#glow-d)"/>

  <!-- 主光芒（长） -->
  <line x1="50" y1="13" x2="50" y2="87" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.85"/>
  <line x1="13" y1="50" x2="87" y2="50" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.85"/>

  <!-- 次光芒（对角，稍短） -->
  <line x1="24" y1="24" x2="76" y2="76" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="76" y1="24" x2="24" y2="76" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- 外环柔化渐变圆 -->
  <circle cx="50" cy="50" r="26" fill="url(#spark-d)" opacity="0.18"/>

  <!-- 核心亮点 -->
  <circle cx="50" cy="50" r="7" fill="#ffffff"/>
  <circle cx="47" cy="47" r="2.5" fill="#ffffff" opacity="0.6"/>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="17" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
