<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- 背景渐变：macOS 风格蓝色 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#1a6fd4"/>
    </linearGradient>

    <!-- 光晕渐变（镜头高光） -->
    <radialGradient id="lens-glow" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- 核心圆渐变 -->
    <radialGradient id="core-grad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#a8d8ff"/>
    </radialGradient>

    <!-- 圆环渐变 -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- macOS 圆角方形底板（squircle 近似） -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg)"/>

  <!-- 背景光晕（增加层次感） -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#lens-glow)"/>

  <!-- 外轨道环 -->
  <circle cx="50" cy="50" r="30"
    fill="none"
    stroke="url(#ring-grad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-dasharray="1 0"/>

  <!-- 中轨道环 -->
  <circle cx="50" cy="50" r="21"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.5"
    stroke-opacity="0.45"/>

  <!-- 核心实心圆（光子） -->
  <circle cx="50" cy="50" r="11" fill="url(#core-grad)"/>

  <!-- 核心高光点 -->
  <circle cx="46" cy="46" r="3.5" fill="#ffffff" opacity="0.7"/>

  <!-- 四个方向的光芒短线（cross rays） -->
  <line x1="50" y1="14" x2="50" y2="20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="50" y1="80" x2="50" y2="86" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="14" y1="50" x2="20" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="80" y1="50" x2="86" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- 四个斜向光芒（次级，细一点） -->
  <line x1="28" y1="28" x2="32.5" y2="32.5" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="72" y1="28" x2="67.5" y2="32.5" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="28" y1="72" x2="32.5" y2="67.5" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="72" y1="72" x2="67.5" y2="67.5" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- 顶部高光（macOS 图标光泽感） -->
  <ellipse cx="50" cy="18" rx="28" ry="10"
    fill="#ffffff" opacity="0.12"/>
</svg>
