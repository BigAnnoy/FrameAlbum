<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-f2" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="glow-f2" cx="36%" cy="33%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="inner-f2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-f2)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#glow-f2)"/>

  <!-- 胶片帧造型：主框 -->
  <rect x="18" y="25" width="64" height="50" rx="4" ry="4"
    fill="url(#inner-f2)" stroke="#ffffff" stroke-width="2.8" stroke-opacity="0.9"/>

  <!-- 胶片齿孔（左侧） -->
  <rect x="11" y="32" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.7"/>
  <rect x="11" y="43" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.7"/>
  <rect x="11" y="54" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.7"/>

  <!-- 胶片齿孔（右侧） -->
  <rect x="82" y="32" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.7"/>
  <rect x="82" y="43" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.7"/>
  <rect x="82" y="54" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.7"/>

  <!-- 帧内：播放三角（视频/帧感） -->
  <polygon points="42,40 42,60 64,50"
    fill="#ffffff" opacity="0.9"/>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="17" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
