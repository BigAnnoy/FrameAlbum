<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="tri-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow-c" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-c)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#glow-c)"/>

  <!-- 棱镜三角形（等边，居中偏上） -->
  <polygon points="50,20 76,64 24,64"
    fill="none"
    stroke="url(#tri-c)"
    stroke-width="3.5"
    stroke-linejoin="round"/>

  <!-- 棱镜内部光线（从顶点发散） -->
  <line x1="50" y1="20" x2="50" y2="64" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- 光谱发散线（底部右侧，代表折射光） -->
  <line x1="76" y1="64" x2="88" y2="58" stroke="#93c5fd" stroke-width="2.2" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="76" y1="64" x2="91" y2="66" stroke="#60a5fa" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.75"/>
  <line x1="76" y1="64" x2="89" y2="74" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- 入射光线（左上） -->
  <line x1="18" y1="28" x2="50" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- 底部文字区留白标注点 -->
  <circle cx="50" cy="76" r="3" fill="#ffffff" opacity="0.25"/>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="17" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
