<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-f1" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow-f1" cx="36%" cy="33%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-f1)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#glow-f1)"/>

  <!-- 外相框（圆角矩形描边） -->
  <rect x="17" y="21" width="66" height="54" rx="5" ry="5"
    fill="none" stroke="#ffffff" stroke-width="3.5" stroke-opacity="0.95"/>

  <!-- 内相框（内嵌小一圈，暗线） -->
  <rect x="22" y="26" width="56" height="44" rx="3" ry="3"
    fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- 四角装饰（相框角标） -->
  <polyline points="17,30 17,21 26,21" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="74,21 83,21 83,30" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="17,66 17,75 26,75" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="74,75 83,75 83,66" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 中心图片占位（山峰 + 太阳，经典图片图标） -->
  <!-- 太阳 -->
  <circle cx="35" cy="38" r="5" fill="#ffffff" opacity="0.85"/>
  <!-- 山峰 -->
  <polyline points="22,60 37,40 49,54 59,44 78,60"
    fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.85"/>
  <!-- 地平线 -->
  <line x1="22" y1="60" x2="78" y2="60" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="17" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
