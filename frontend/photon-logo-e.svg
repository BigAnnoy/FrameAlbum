<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-e" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="glow-e" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave-e" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 底板 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#bg-e)"/>
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#glow-e)"/>

  <!-- 波形/正弦曲线（光是波）— 三条横向波形 -->
  <!-- 波形1（居中） -->
  <path d="M14,50 C22,38 30,38 38,50 C46,62 54,62 62,50 C70,38 78,38 86,50"
    fill="none" stroke="url(#wave-e)" stroke-width="3" stroke-linecap="round"/>

  <!-- 波形2（上方，较淡） -->
  <path d="M14,38 C22,26 30,26 38,38 C46,50 54,50 62,38 C70,26 78,26 86,38"
    fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- 波形3（下方，较淡） -->
  <path d="M14,62 C22,50 30,50 38,62 C46,74 54,74 62,62 C70,50 78,50 86,62"
    fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- 中心高亮粒子（波峰处的光子） -->
  <circle cx="38" cy="50" r="4.5" fill="#ffffff"/>
  <circle cx="62" cy="50" r="4.5" fill="#ffffff"/>

  <!-- 运动轨迹虚线（粒子路径） -->
  <line x1="14" y1="50" x2="32" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3 3" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="44" y1="50" x2="56" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3 3" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="68" y1="50" x2="86" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3 3" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- 顶部高光 -->
  <ellipse cx="50" cy="17" rx="26" ry="9" fill="#ffffff" opacity="0.1"/>
</svg>
